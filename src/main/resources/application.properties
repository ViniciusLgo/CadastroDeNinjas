spring.application.name=CadastroDeNinjas

spring.config.import=optional:file:.env[.properties]

spring.h2.console.enabled=true
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:cadastrodb;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}

# Swagger/OpenAPI
# /swagger-ui.html abre a interface visual para testar as rotas sem Postman.
# /v3/api-docs mostra o contrato OpenAPI em JSON, usado pela propria tela do Swagger.
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=dev.java10x.CadastroDeNinjas
